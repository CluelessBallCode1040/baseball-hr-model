name: Daily HR Model Refresh

on:
  schedule:
    # Runs daily at 13:00 UTC (9:00 AM Eastern Time)
    - cron: '0 13 * * *'
  # Allows you to manually click a button on GitHub to run it anytime
  workflow_dispatch: 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Speeds up subsequent runs

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy pybaseball requests

    - name: Execute Model Script
      run: python daily_top_10.py

    - name: Commit and Save Daily Results
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add top_10_matchups.csv
        git commit -m "Automated Daily Update: $(date +'%Y-%m-%d')" || exit 0
        git push
